name: 🚀 Deploy to Hostinger

on:
  push:
    branches:
      - main  # Ou o nome da sua branch principal (ex: master)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔨 Install dependencies
        run: npm install

      - name: 🏗️ Build Project
        run: npm run build

      - name: 📂 Sync files to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/  # Pasta que o Next.js gera no build estático
          server-dir: /public_html/  # Pasta padrão da Hostinger
          state-name: .ftp-deploy-sync-state.json # Evita re-upload de arquivos que não mudaram
